<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
</head>
<body>

    <h1>My Image Gallery</h1>

    <section>

        <figure>
            <img src="images/image1.jpg" alt="Sample Image 1" width="300">
            <figcaption>Beautiful Nature</figcaption>
        </figure>

        <figure>
            <img src="images/image2.jpg" alt="Sample Image 2" width="300">
            <figcaption>Mountain View</figcaption>
        </figure>

        <figure>
            <img src="images/image3.jpg" alt="Sample Image 3" width="300">
            <figcaption>City Lights</figcaption>
        </figure>

        <figure>
            <img src="images/image4.jpg" alt="Sample Image 4" width="300">
            <figcaption>Ocean Scene</figcaption>
        </figure>

    </section>

</body>
</html>
