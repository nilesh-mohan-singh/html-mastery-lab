<!DOCTYPE html>
<html>
<head>
    <title>Lists and Links</title>
</head>
<body>

    <h1>My Learning Goals</h1>

    <h2>Top 5 Goals</h2>
    <ol>
        <li>Learn HTML properly</li>
        <li>Understand CSS</li>
        <li>Start JavaScript</li>
        <li>Build projects</li>
        <li>Become confident</li>
    </ol>

    <h2>Skills I Want to Learn</h2>
    <ul>
        <li>Web Development</li>
        <li>Python</li>
        <li>Cyber Security</li>
    </ul>

    <h2>Useful Links</h2>
    <p>
        <a href="https://developer.mozilla.org/" target="_blank">Learn HTML (MDN)</a>
    </p>
    <p>
        <a href="https://www.w3schools.com/" target="_blank">W3Schools</a>
    </p>

</body>
</html>
